<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics</title>
    <style>
        :root {
            --bg:      #0d1117;
            --surface: #161b22;
            --border:  #30363d;
            --text:    #e6edf3;
            --muted:   #8b949e;
            --accent:  #58a6ff;
            --accent2: #3fb950;
            --bar-bg:  #21262d;
        }

        :root.light {
            --bg:      #f6f8fa;
            --surface: #ffffff;
            --border:  #d0d7de;
            --text:    #1f2328;
            --muted:   #656d76;
            --accent:  #0969da;
            --accent2: #1a7f37;
            --bar-bg:  #eaeef2;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            line-height: 1.5;
            min-height: 100vh;
            padding: 1.5rem 1rem 3rem;
        }

        .wrap { max-width: 960px; margin: 0 auto; }

        header { margin-bottom: 1.75rem; }
        header h1 { font-size: 1.6rem; font-weight: 600; }
        header p  { color: var(--muted); font-size: 0.9rem; margin-top: 0.2rem; }

        /* ── Controls ── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.35rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: border-color 0.15s;
            font-family: inherit;
        }
        .btn:hover { border-color: var(--accent); }
        .btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #0d1117;
            font-weight: 600;
        }

        .period-group { display: flex; gap: 0.25rem; }

        .date-label {
            color: var(--muted);
            font-size: 0.85rem;
            margin-left: 0.25rem;
            align-self: center;
        }

        .loading { color: var(--accent); font-size: 0.85rem; align-self: center; }
        .loading[hidden] { display: none; }

        /* ── Theme toggle ── */
        .theme-toggle {
            margin-left: auto;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            transition: border-color 0.15s;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--text); }

        /* ── Month picker row ── */
        .history-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .history-label {
            color: var(--muted);
            font-size: 0.82rem;
            white-space: nowrap;
        }

        .month-select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            min-width: 160px;
        }
        .month-select:focus { outline: 1px solid var(--accent); }

        .history-note {
            color: var(--muted);
            font-size: 0.78rem;
        }

        /* ── Metric cards ── */
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 1.75rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.1rem 1.25rem;
        }

        .card-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }

        .card-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        /* ── Two-column panels ── */
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 600px) {
            .panels { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.1rem 1.25rem;
        }

        .panel h2 {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        /* ── Bar rows ── */
        .bar-list { display: flex; flex-direction: column; gap: 0.55rem; }

        .bar-row { display: flex; flex-direction: column; gap: 0.2rem; }

        .bar-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
        }

        .bar-label {
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 75%;
        }

        .bar-count { color: var(--muted); flex-shrink: 0; }

        .bar-track {
            height: 6px;
            background: var(--bar-bg);
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .bar-fill.green { background: var(--accent2); }

        /* ── Trend chart ── */
        .trend-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.1rem 1.25rem;
            margin-bottom: 1rem;
        }

        .trend-panel h2 {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .trend-chart {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 80px;
        }

        .trend-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            height: 100%;
            justify-content: flex-end;
            min-width: 0;
        }

        .trend-bar {
            width: 100%;
            background: var(--accent);
            border-radius: 2px 2px 0 0;
            min-height: 2px;
        }

        .trend-tick {
            font-size: 0.58rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            text-align: center;
        }

        .empty {
            color: var(--muted);
            font-size: 0.85rem;
            padding: 1rem 0;
            text-align: center;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="wrap">

    <header>
        <h1 id="siteTitle">Analytics</h1>
        <p>Privacy-first — pages and referrers only, no tracking scripts</p>
    </header>

    <div class="controls">
        <button class="btn" id="prevBtn">&#8592; Prev</button>
        <div class="period-group">
            <button class="btn active" data-period="day">Day</button>
            <button class="btn" data-period="week">Week</button>
            <button class="btn" data-period="month">Month</button>
        </div>
        <button class="btn" id="nextBtn">Next &#8594;</button>
        <span class="date-label" id="dateLabel"></span>
        <span class="loading" id="loading" hidden>Loading&#8230;</span>
        <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">&#9788; Light</button>
    </div>

    <div class="history-row">
        <span class="history-label">Jump to month:</span>
        <select class="month-select" id="monthPicker">
            <option value="">&#8212; loading history &#8212;</option>
        </select>
        <span class="history-note" id="historyNote"></span>
    </div>

    <div class="metrics">
        <div class="card">
            <div class="card-label">Unique Visitors</div>
            <div class="card-value" id="mVisitors">&#8212;</div>
        </div>
        <div class="card">
            <div class="card-label">Page Views</div>
            <div class="card-value" id="mPageviews">&#8212;</div>
        </div>
        <div class="card">
            <div class="card-label">Pages / Day</div>
            <div class="card-value" id="mAvg">&#8212;</div>
        </div>
    </div>

    <div class="trend-panel">
        <h2>Traffic trend</h2>
        <div class="trend-chart" id="trendChart"></div>
    </div>

    <div class="panels">
        <div class="panel">
            <h2>Top pages</h2>
            <div class="bar-list" id="pagesList"></div>
        </div>
        <div class="panel">
            <h2>Referrers</h2>
            <div class="bar-list" id="referrersList"></div>
        </div>
    </div>

    <footer id="footer"></footer>

</div>
<script>
(function () {
    'use strict';

    /* ── Config: edit these two lines per deployment ── */
    var SITE_NAME = 'clickforcharity.net';          /* e.g. 'faucetlist.org'      */
    var DATA_PATH = 'data/analytics';     /* relative to this HTML file */

    /* ── State ── */
    var period  = 'day';
    var refDate = today();
    var cache   = {};
    var allDates = [];   /* populated from index.json */

    /* ── Boot ── */
    document.getElementById('siteTitle').textContent = SITE_NAME + ' — Analytics';
    document.title = SITE_NAME + ' Analytics';

    /* ── Theme ── */
    var root = document.documentElement;
    function applyTheme(light) {
        root.classList.toggle('light', light);
        document.getElementById('themeToggle').textContent = light ? '\u263D Dark' : '\u2600 Light';
    }
    var savedTheme = localStorage.getItem('analytics_theme');
    applyTheme(savedTheme === 'light');
    document.getElementById('themeToggle').addEventListener('click', function () {
        var isLight = root.classList.toggle('light');
        localStorage.setItem('analytics_theme', isLight ? 'light' : 'dark');
        this.textContent = isLight ? '\u263D Dark' : '\u2600 Light';
    });

    loadIndex().then(function () {
        load();
    });

    /* ── Event listeners ── */
    document.getElementById('prevBtn').addEventListener('click', function () {
        refDate = shiftDate(refDate, -1);
        syncPicker();
        load();
    });

    document.getElementById('nextBtn').addEventListener('click', function () {
        var shifted = shiftDate(refDate, 1);
        if (periodStart(shifted) <= today()) {
            refDate = shifted;
            syncPicker();
            load();
        }
    });

    document.querySelectorAll('[data-period]').forEach(function (btn) {
        btn.addEventListener('click', function () {
            period  = btn.dataset.period;
            refDate = today();
            document.querySelectorAll('[data-period]').forEach(function (b) {
                b.classList.toggle('active', b === btn);
            });
            syncPicker();
            load();
        });
    });

    document.getElementById('monthPicker').addEventListener('change', function () {
        var val = this.value;
        if (!val) return;
        /* val is YYYY-MM — jump to that month in month-period view */
        refDate = val + '-01';
        period  = 'month';
        document.querySelectorAll('[data-period]').forEach(function (b) {
            b.classList.toggle('active', b.dataset.period === 'month');
        });
        load();
    });

    /* ── Load index.json ── */
    function loadIndex() {
        return fetch(DATA_PATH + '/index.json')
            .then(function (r) { return r.ok ? r.json() : []; })
            .then(function (dates) {
                allDates = Array.isArray(dates) ? dates : [];
                buildPicker();
            })
            .catch(function () {
                allDates = [];
                buildPicker();
            });
    }

    function buildPicker() {
        var picker = document.getElementById('monthPicker');
        var note   = document.getElementById('historyNote');

        if (!allDates.length) {
            picker.innerHTML = '<option value="">No history yet</option>';
            return;
        }

        /* Group dates into months */
        var months = {};
        allDates.forEach(function (d) {
            var ym = d.slice(0, 7); /* YYYY-MM */
            months[ym] = (months[ym] || 0) + 1;
        });

        var ymKeys = Object.keys(months).sort().reverse(); /* newest first */

        var options = ['<option value="">&#8212; jump to month &#8212;</option>'];
        ymKeys.forEach(function (ym) {
            var dt    = new Date(ym + '-01T00:00:00');
            var label = dt.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
            options.push('<option value="' + ym + '">' + label + ' (' + months[ym] + ' days)</option>');
        });

        picker.innerHTML = options.join('');

        var earliest = allDates[0];
        var latest   = allDates[allDates.length - 1];
        note.textContent = allDates.length + ' days of data  \u00b7  ' + earliest + ' \u2013 ' + latest;
    }

    function syncPicker() {
        /* Keep the dropdown in sync when navigating with Prev/Next */
        var picker = document.getElementById('monthPicker');
        if (!picker.options.length) return;
        var ym = refDate.slice(0, 7);
        for (var i = 0; i < picker.options.length; i++) {
            if (picker.options[i].value === ym) {
                picker.selectedIndex = i;
                return;
            }
        }
        picker.selectedIndex = 0;
    }

    /* ── Load & render ── */
    function load() {
        var dates   = datesInRange(periodStart(refDate), periodEnd(refDate));
        var needed  = dates.filter(function (d) { return !cache[d]; });
        var loading = document.getElementById('loading');
        loading.hidden = (needed.length === 0);

        Promise.all(needed.map(fetchReport)).then(function () {
            loading.hidden = true;
            render(dates);
        });
    }

    function fetchReport(dateStr) {
        return fetch(DATA_PATH + '/report-' + dateStr + '.json')
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (data) { if (data) cache[dateStr] = data; })
            .catch(function () {});
    }

    function render(dates) {
        var agg  = aggregate(dates);
        var days = dates.length;

        set('mVisitors',  fmt(agg.visitors));
        set('mPageviews', fmt(agg.pageviews));
        set('mAvg',       fmt(Math.round(agg.pageviews / days)));
        set('dateLabel',  dateRangeLabel(dates));

        renderTrend(dates, agg.daily);
        renderBars('pagesList',     topN(agg.pages,     10), false);
        renderBars('referrersList', topN(agg.referrers, 10), true);

        var withData = dates.filter(function (d) { return cache[d]; }).length;
        set('footer', 'Showing ' + dates[0] + ' to ' + dates[dates.length - 1]
            + '  \u00b7  ' + withData + ' of ' + days + ' days with data');
    }

    /* ── Aggregation ── */
    function aggregate(dates) {
        var out = { visitors: 0, pageviews: 0, pages: {}, referrers: {}, daily: {} };
        dates.forEach(function (d) {
            var r = cache[d];
            if (!r) return;
            out.visitors  += r.summary.visitors  || 0;
            out.pageviews += r.summary.pageviews || 0;
            out.daily[d]   = r.summary;
            (r.pages || []).forEach(function (p) {
                out.pages[p.path] = (out.pages[p.path] || 0) + p.views;
            });
            (r.referrers || []).forEach(function (ref) {
                out.referrers[ref.source] = (out.referrers[ref.source] || 0) + ref.visits;
            });
        });
        return out;
    }

    /* ── Trend chart ── */
    function renderTrend(dates, daily) {
        var chart  = document.getElementById('trendChart');
        var values = dates.map(function (d) {
            return daily[d] ? (daily[d].pageviews || 0) : 0;
        });
        var max = Math.max.apply(null, values) || 1;

        chart.innerHTML = dates.map(function (d, i) {
            var pct   = Math.round((values[i] / max) * 100);
            var label = d.slice(5); /* MM-DD */
            return '<div class="trend-col" title="' + d + ': ' + values[i] + ' views">'
                + '<div class="trend-bar" style="height:' + pct + '%"></div>'
                + '<div class="trend-tick">' + label + '</div>'
                + '</div>';
        }).join('');
    }

    /* ── Bar list ── */
    function renderBars(id, items, green) {
        var el = document.getElementById(id);
        if (!items.length) {
            el.innerHTML = '<div class="empty">No data</div>';
            return;
        }
        var max = items[0][1] || 1;
        el.innerHTML = items.map(function (item) {
            var pct = Math.round((item[1] / max) * 100);
            var cls = green ? ' green' : '';
            return '<div class="bar-row">'
                + '<div class="bar-meta">'
                + '<span class="bar-label" title="' + esc(item[0]) + '">' + esc(item[0]) + '</span>'
                + '<span class="bar-count">' + fmt(item[1]) + '</span>'
                + '</div>'
                + '<div class="bar-track"><div class="bar-fill' + cls + '" style="width:' + pct + '%"></div></div>'
                + '</div>';
        }).join('');
    }

    /* ── Date helpers ── */
    function today() {
        return new Date().toISOString().slice(0, 10);
    }

    function periodStart(d) {
        var dt = new Date(d + 'T00:00:00');
        if (period === 'week') {
            dt.setDate(dt.getDate() - dt.getDay());
        } else if (period === 'month') {
            dt.setDate(1);
        }
        return dt.toISOString().slice(0, 10);
    }

    function periodEnd(d) {
        var dt = new Date(d + 'T00:00:00');
        if (period === 'week') {
            dt.setDate(dt.getDate() + (6 - dt.getDay()));
        } else if (period === 'month') {
            dt.setMonth(dt.getMonth() + 1);
            dt.setDate(0);
        }
        return dt.toISOString().slice(0, 10);
    }

    function shiftDate(d, dir) {
        var dt = new Date(d + 'T00:00:00');
        if (period === 'day')   dt.setDate(dt.getDate() + dir);
        if (period === 'week')  dt.setDate(dt.getDate() + dir * 7);
        if (period === 'month') dt.setMonth(dt.getMonth() + dir);
        return dt.toISOString().slice(0, 10);
    }

    function datesInRange(start, end) {
        var dates = [];
        var cur   = new Date(start + 'T00:00:00');
        var last  = new Date(end   + 'T00:00:00');
        while (cur <= last) {
            dates.push(cur.toISOString().slice(0, 10));
            cur.setDate(cur.getDate() + 1);
        }
        return dates;
    }

    function dateRangeLabel(dates) {
        if (dates.length === 1) return dates[0];
        return dates[0] + ' \u2013 ' + dates[dates.length - 1];
    }

    /* ── Utilities ── */
    function topN(obj, n) {
        return Object.entries(obj)
            .sort(function (a, b) { return b[1] - a[1]; })
            .slice(0, n);
    }

    function fmt(n) { return Number(n).toLocaleString(); }

    function set(id, text) {
        var el = document.getElementById(id);
        if (el) el.textContent = text;
    }

    function esc(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

}());
</script>
</body>
</html>
